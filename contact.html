<head>

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CGF 2026 Theme -->
    <link href="css/cgf2026.css" rel="stylesheet" />
</head>
<body>

    <!-- Navigation -->
    <nav class="cgf-navbar navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="cgf2026-logo.svg" alt="China-Gulf Forum 2026" style="height: 2.8em; width: auto;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#cgfNav" aria-controls="cgfNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="cgfNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="panel.html">Panels</a></li>
                    <li class="nav-item"><a class="nav-link" href="partners.html">Team</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="https://nyuad.nyu.edu/en/events/2024/april/china-gulf-forum-2024.html">Register</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="section-spacing">
        <div class="contact-section">
            <h2>Contact Us</h2>
            <hr class="gold-divider">
            <form action="https://formspree.io/f/mpwqjqoe" method="POST">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>

                <div class="row">
                    <div class="col-md-7">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Your email" required>
                    </div>
                    <div class="col-md-5 d-flex align-items-end pb-3">
                        <p class="contact-location mb-0">Saadiyat Island, New York University Abu Dhabi</p>
                    </div>
                </div>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Your message" required></textarea>

                <div class="text-center">
                    <button type="submit">Send Message</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="cgf-footer">
        <div class="footer-inner">
            <a href="index.html" class="footer-brand">
                <img src="cgf2026-logo.svg" alt="CGF 2026">
            </a>
            <div class="footer-social">
                <a href="https://mp.weixin.qq.com/mp/profile_ext?action=home&__biz=Mzk0NDE5NTkwMQ==&scene=124#wechat_redirect" target="_blank" title="WeChat"><img src="wechat.svg" alt="WeChat"></a>
                <a href="https://www.instagram.com/china_gulf_forum/" target="_blank" title="Instagram"><img src="instagram.svg" alt="Instagram"></a>
                <a href="https://www.linkedin.com/company/china-gulf-forum/posts/?feedView=all" target="_blank" title="LinkedIn"><img src="linkedin.svg" alt="LinkedIn"></a>
                <a href="mailto:china-gulf-forum-nyuad@nyu.edu" title="Email"><img src="mail.png" alt="Email"></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 China-Gulf Forum. A student-led initiative fostering China-Gulf dialogue since 2019.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
